<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0>
    <title> My OS Background </title>
    <style>
        /* 1. Resetting standard browser gaps and lock height */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
           }

        /* 2. Configuring the background container */
        .background-container {
            position: relative; /* Allows child items to layer over it absolute */
            width: 100%;
            height: 100vh; /* Fills 100% of the device screen height */
            
            /* Background image settings */
            background-image: url('https://wallpapers-clan.com/wp-content/uploads/2025/01/spider-man-red-city-silhouette-desktop-wallpaper-preview.jpg');
            background-size: cover; /* Crops and scales cleanly without distortion */
            background-position: center; /* Locks the middle of the image in view */
            background-repeat: no-repeat; /* Stops image from tiling */
        }
    

  </style>

</html>
